spring.application.name=Turism
server.port=8085
spring.config.import=optional:file:../.env[.properties]

# Ticketmaster (evenimente)
ticketmaster.api.base-url=https://app.ticketmaster.com/discovery/v2
ticketmaster.api.key=${TICKETMASTER_API_KEY:}
ticketmaster.api.default-country-code=

# Overpass API (locuri OpenStreetMap, gratuit, fara API key)
overpass.api.base-url=https://overpass-api.de/api/interpreter
# TTL cache locuri in zile - dupa cate zile re-fetch din Overpass
overpass.cache.ttl-days=7

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# PostgreSQL + PostGIS (placesdb)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/placesdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema-ul este creat de db-init (create-databases.sh)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
