server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback – orice ruta necunoscuta → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy catre Turism microservice (evitam CORS)
    location /api/turism/ {
        proxy_pass http://turism-service:8085/api/turism/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy catre ChatBox microservice (evitam CORS)
    location /chatbox/ {
        proxy_pass http://chatbox-service:8086/chatbox/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy catre User microservice (evitam CORS)
    location /api/ {
        proxy_pass http://user-service:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy catre Weather microservice (evitam CORS)
    location /weather {
        proxy_pass http://weather-service:8082/weather;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy catre AI microservice (evitam CORS)
    location /ai/ {
        proxy_pass http://ai-service:8083/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy catre Games microservice (Fog of War game)
    location /games/ {
        proxy_pass http://games-service:8084/games/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}

