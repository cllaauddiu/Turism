spring.application.name=Weather
server.port=8082

# Open-Meteo API (gratuit, fara API key)
openmeteo.api.base-url=https://api.open-meteo.com/v1/forecast

# TimescaleDB (PostgreSQL cu extensia time-series)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/weatherdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema-ul este deja creat de scriptul db-init-weather/01-init-weather.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
