spring.application.name=Games
server.port=8084

# PostgreSQL ? foloseste variabila de mediu din Docker, sau GameDB local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/GameDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate ? creeaza tabelele automat (zones, user_zone_progress)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# AI Service
ai.service.url=${AI_SERVICE_URL:http://localhost:8083}

